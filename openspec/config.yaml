schema: intent-driven

context: |
  This is a Nix-based dotfiles repository using Nix Flakes, Home Manager, and NixOS.
  All configuration files are generated from literate Org mode files via Emacs tangle:

  - Config.txt → tangles to .nix files (host configs, modules, vars)
  - Emacs.txt  → tangles to init.el, early-init.el, templates.eld

  Key workflow rules:
  - Always edit the .txt (Org mode) files, never edit generated .nix/.el files directly
  - After editing, run `ent generate` or `./bin/generate-admin` to tangle
  - Commit both the .txt source and the generated files together
  - Two hosts: mary (Framework laptop) and bob (desktop)
  - Home Manager modules: modules/home/<name>.nix
  - NixOS modules: modules/nixos/<name>.nix
  - Secrets managed via SOPS (secrets/secrets.yaml, age key at ~/.ssh/id_sops_age)

rules:
  proposal:
    - Must use grill-me skill
  design:
    - Must use c4-diagrams skill
  adr:
    - Must use architectural-decision-records skill
  spec:
    - Must use gherkin-authoring skill 
